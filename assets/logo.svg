<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="50%" style="stop-color:#f0d68a"/>
      <stop offset="100%" style="stop-color:#d4a843"/>
    </linearGradient>
    <linearGradient id="city" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="100%" style="stop-color:#d4a843"/>
    </linearGradient>
  </defs>
  <!-- City silhouette -->
  <rect x="2" y="28" width="4" height="20" fill="url(#city)" rx="1"/>
  <rect x="8" y="22" width="4" height="26" fill="url(#city)" rx="1"/>
  <rect x="14" y="16" width="4" height="32" fill="url(#city)" rx="1"/>
  <rect x="20" y="10" width="5" height="38" fill="url(#city)" rx="1"/>
  <polygon points="22,6 18,14 26,14" fill="#d4a843"/>
  <!-- Main tower -->
  <rect x="34" y="12" width="8" height="36" fill="url(#city)" rx="2"/>
  <polygon points="38,4 30,16 46,16" fill="#d4a843"/>
  <rect x="36" y="4" width="4" height="10" fill="#d4a843" rx="1"/>
  <!-- White tree symbol -->
  <circle cx="38" cy="22" r="3" fill="none" stroke="#f0d68a" stroke-width="0.8"/>
  <line x1="38" y1="25" x2="38" y2="30" stroke="#f0d68a" stroke-width="0.8"/>
  <rect x="44" y="20" width="5" height="28" fill="url(#city)" rx="1"/>
  <rect x="51" y="14" width="4" height="34" fill="url(#city)" rx="1"/>
  <rect x="57" y="8" width="5" height="40" fill="url(#city)" rx="1"/>
  <rect x="64" y="20" width="4" height="28" fill="url(#city)" rx="1"/>
  <rect x="70" y="26" width="4" height="22" fill="url(#city)" rx="1"/>
  <!-- Text -->
  <text x="90" y="32" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="url(#txt)" letter-spacing="1">MINAS TIRITH</text>
  <text x="90" y="48" font-family="Arial, sans-serif" font-size="10" fill="#a09070" letter-spacing="3">BRICK COLLECTION</text>
</svg>
