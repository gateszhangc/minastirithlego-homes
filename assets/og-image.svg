  </g>
  <!-- Text -->
  <text x="600" y="280" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#d4a843" text-anchor="middle" letter-spacing="3">MINAS TIRITH</text>
  <text x="600" y="350" font-family="Georgia, serif" font-size="28" fill="#a09070" text-anchor="middle" letter-spacing="2">LEGO® Icons Collection</text>
  <line x1="350" y1="390" x2="850" y2="390" stroke="#d4a843" stroke-width="1" opacity="0.5"/>
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="18" fill="#c0b090" text-anchor="middle" letter-spacing="5">THE LORD OF THE RINGS</text>
  <!-- Brick pattern -->
  <g opacity="0.05">
    <rect x="550" y="490" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="566" y="490" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="582" y="490" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="598" y="490" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="614" y="490" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="630" y="490" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="558" y="498" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="574" y="498" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="590" y="498" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="606" y="498" width="14" height="6" rx="1" fill="#d4a843"/>
    <rect x="622" y="498" width="14" height="6" rx="1" fill="#d4a843"/>
