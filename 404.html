<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Minas Tirith Brick Collection</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .error-code {
      font-family: var(--font-serif);
      font-size: 120px;
      color: var(--accent-gold);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-family: var(--font-serif);
      font-size: 28px;
      margin-bottom: 12px;
    }
    .error-desc {
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">The City You Seek Has Not Been Found</h1>
      <p class="error-desc">The page you are looking for does not exist in this realm.</p>
      <a href="/" class="btn btn-primary">Return to the White City</a>
    </div>
  </div>
</body>
</html>
